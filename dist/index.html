    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script>
      (() => {
        try {
          const stored = localStorage.getItem('coupure_theme_v1')
          const theme = ['system', 'dark', 'light'].includes(stored) ? stored : 'light'
          const resolved = theme === 'system'
            ? (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : theme
          document.documentElement.dataset.theme = resolved
        } catch {
          document.documentElement.dataset.theme = 'light'
        }
      })()
    </script>
    <title>MacroCut</title>
